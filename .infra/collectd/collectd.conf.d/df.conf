<Plugin df>
    MountPoint "/"
    MountPoint "/home"
    MountPoint "/var"
    
    FSType "fuse.gvfsd-fuse"
    FSType "fuse.kio-fuse"
    FSType "tmpfs"
    FSType "devtmpfs"
    IgnoreSelected true
    
    ReportByDevice false
    ReportInodes false
    ValuesAbsolute true
    ValuesPercentage true
</Plugin>
