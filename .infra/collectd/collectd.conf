Hostname "localhost"
FQDNLookup false
BaseDir "/opt/collectd/var/lib/collectd"
PluginDir "/opt/collectd/lib/collectd"
TypesDB "/opt/collectd/share/collectd/types.db"
Interval 5

LoadPlugin syslog
LoadPlugin memory
LoadPlugin interface
LoadPlugin disk
LoadPlugin rrdtool
LoadPlugin load
LoadPlugin df
LoadPlugin swap
LoadPlugin uptime
LoadPlugin cpu
LoadPlugin aggregation

<Plugin syslog>
    LogLevel info
</Plugin>

<Plugin memory>
    ValuesAbsolute true
    ValuesPercentage true
</Plugin>

<Plugin rrdtool>
    DataDir "/opt/collectd/var/lib/collectd/rrd"
    CacheTimeout 5
    CacheFlush 5
    WritesPerSecond 50
    RRARows 2400
    RRATimespan 3600 86400 604800
    StepSize 5
</Plugin>

Include "/opt/collectd/etc/collectd.conf.d/*.conf"
