name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y librrd-dev duktape-dev gcc make jq

      - name: Build
        run: make build

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/
          retention-days: 1

  test-unit:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: bin/

      - name: Fix permissions
        run: chmod +x bin/*

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y librrd-dev duktape-dev collectd rrdtool rrdcached gcc

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: tests/go.sum

      - name: Setup environment
        run: |
          set -e

          # Create user if not exist
          sudo useradd -r -s /bin/false collectd 2>/dev/null || true

          # Setup directories
          sudo mkdir -p /opt/collectd/var/lib/collectd/rrd/localhost/cpu-total
          sudo mkdir -p /var/run

          # Debug: check rrdtool
          which rrdtool
          rrdtool --version

          # Create RRD file with proper start time, then populate chronologically
          NOW=$(date +%s)
          START=$((NOW - 7200))
          echo "Creating RRD with START=$START NOW=$NOW"

          sudo rrdtool create /opt/collectd/var/lib/collectd/rrd/localhost/cpu-total/percent-active.rrd \
            --start "$START" \
            DS:percent:GAUGE:60:0:100 RRA:AVERAGE:0.5:1:100

          echo "RRD file created, populating..."

          for i in $(seq 1 120); do
            TS=$((START + i * 60))
            VALUE=$((20 + RANDOM % 40))
            sudo rrdtool update /opt/collectd/var/lib/collectd/rrd/localhost/cpu-total/percent-active.rrd "$TS:$VALUE"
          done

          echo "Done populating RRD"
          ls -la /opt/collectd/var/lib/collectd/rrd/localhost/cpu-total/

          sudo chown -R collectd:collectd /opt/collectd/var/lib/collectd

          # Start rrdcached
          sudo mkdir -p /var/lib/rrdcached/journal
          sudo rrdcached -p /var/run/rrdcached.pid \
            -l unix:/var/run/rrdcached.sock \
            -B -F \
            -b /opt/collectd/var/lib/collectd/rrd \
            -j /var/lib/rrdcached/journal \
            -f 3600 -w 1800 -z 900 &
          sleep 2

      - name: Run E2E tests
        run: cd tests/internal && go test -v ./e2e/...

      - name: Run Load tests
        run: cd tests/internal && go test -v ./load/...

  test-ui:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: bin/

      - name: Fix permissions
        run: chmod +x bin/*

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y librrd-dev duktape-dev collectd rrdtool rrdcached python3 python3-venv

      - name: Setup environment
        run: |
          set -e

          sudo useradd -r -s /bin/false collectd 2>/dev/null || true

          sudo mkdir -p /opt/collectd/var/lib/collectd/rrd/localhost/cpu-total

          # Debug: check rrdtool
          which rrdtool
          rrdtool --version

          # Create RRD file with proper start time, then populate chronologically
          NOW=$(date +%s)
          START=$((NOW - 7200))
          echo "Creating RRD with START=$START NOW=$NOW"

          sudo rrdtool create /opt/collectd/var/lib/collectd/rrd/localhost/cpu-total/percent-active.rrd \
            --start "$START" \
            DS:percent:GAUGE:60:0:100 RRA:AVERAGE:0.5:1:100

          echo "RRD file created, populating..."

          for i in $(seq 1 120); do
            TS=$((START + i * 60))
            VALUE=$((20 + RANDOM % 40))
            sudo rrdtool update /opt/collectd/var/lib/collectd/rrd/localhost/cpu-total/percent-active.rrd "$TS:$VALUE"
          done

          echo "Done populating RRD"
          ls -la /opt/collectd/var/lib/collectd/rrd/localhost/cpu-total/

          sudo chown -R collectd:collectd /opt/collectd/var/lib/collectd

      - name: Install Python deps
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r tests/internal/ui/requirements.txt

      - name: Start servers
        run: |
          ./bin/svgd ./config.json &
          ./bin/svgd-gate 127.0.0.1 8081 8080 ./gate/static &
          sleep 3

      - name: Run UI tests
        run: |
          . .venv/bin/activate
          make test-ui

  docker:
    needs: [test-unit, test-ui]
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build base images
        run: make docker-bases

      - name: Build Docker image
        run: docker build -t svgd:${{ github.sha }} .

      - name: Build multi-datasource demo
        run: docker compose -f docker-compose.multi.yml build
