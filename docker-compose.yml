services:
  # Backend - LSRP server (svgd)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./bin/svgd", "./config.json"]
    ports:
      - "8081:8081"
    volumes:
      - ./config.json:/app/config.json:ro
      - rrd-data:/opt/collectd/var/lib/collectd/rrd:ro
    depends_on:
      collectd:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8081 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Gateway - HTTP server (svgd-gate)
  gate:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./bin/svgd-gate", "backend", "8081", "8080", "./gate/static"]
    ports:
      - "8080:8080"
    volumes:
      - ./config.json:/app/config.json:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Test runner
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.tests
    volumes:
      - rrd-data:/opt/collectd/var/lib/collectd/rrd:ro
    depends_on:
      - backend
      - gate
    profiles:
      - test

  # Metrics collector
  collectd:
    build:
      context: ./.infra/collectd
      dockerfile: Dockerfile
    volumes:
      - rrd-data:/opt/collectd/var/lib/collectd/rrd
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -d /opt/collectd/var/lib/collectd/rrd/localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # PostgreSQL for database metrics (optional)
  postgres:
    image: bitnami/postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: test
    ports:
      - "6532:5432"
    profiles:
      - full
      - test
    restart: unless-stopped

volumes:
  rrd-data:
